<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT 3.0 - 和風分析系統</title>

    <!-- Google Fonts 字體載入 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Share+Tech+Mono&family=Noto+Serif+TC:wght@400;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* ============================================================
   DARK CASINO VIP THEME — AT 3.0
   ============================================================ */

        @font-face {
            font-family: 'AT01';
            src: url('suit/at01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg-void: #02040a;
            --bg-base: #060d1c;
            --bg-panel: rgba(8, 18, 40, 0.92);
            --bg-row-alt: rgba(255, 255, 255, 0.012);

            --gold: #c9a227;
            --gold-bright: #f0c840;
            --gold-dim: #7a6020;
            --gold-glow: rgba(201, 162, 39, 0.45);

            --crimson: #e63946;
            --sapphire: #4a9eff;
            --emerald: #2ec4b6;

            --text-primary: #f0e6d3;
            --text-secondary: #a89070;
            --text-dim: #3a3858;

            /* legacy compat */
            --shuiro: var(--crimson);
            --ai: var(--sapphire);
            --matcha: var(--emerald);
            --sumi: var(--text-primary);
            --sumi-light: var(--text-secondary);
            --kincha: var(--gold);
            --washi: var(--bg-panel);

            --font-display: 'Cinzel', serif;
            --font-mono: 'Share Tech Mono', monospace;
            --font-body: 'Noto Serif TC', serif;
            --font-tegomin: 'Noto Serif TC', serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 16px;
            font-family: var(--font-body);
            background: var(--bg-void);
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(15, 40, 100, 0.55) 0%, transparent 70%),
                radial-gradient(ellipse 55% 40% at 85% 100%, rgba(100, 20, 35, 0.3) 0%, transparent 60%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    rgba(0, 0, 0, 0.04) 0px, rgba(0, 0, 0, 0.04) 1px,
                    transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 9999;
            opacity: 0.45;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 12px;
            position: relative;
        }

        /* ── TOP CONTROLS ── */
        .top-controls {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 14px;
            padding: 10px 18px;
            background: var(--bg-panel);
            border: 1px solid rgba(201, 162, 39, 0.22);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.04);
        }

        .suit-selector {
            display: flex;
            gap: 20px;
        }

        .circle-stats-wrapper {
            margin-left: auto;
        }

        .top-right-tools {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .suit-button {
            width: 78px;
            height: 78px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform .3s cubic-bezier(.68, -.55, .265, 1.55), filter .2s;
            filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.7));
        }

        .suit-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .suit-button:hover {
            transform: scale(1.12) rotate(5deg);
            filter: drop-shadow(0 0 10px var(--gold)) brightness(1.1);
        }

        .suit-button.selected {
            transform: scale(1.28);
            animation: suitBounce .45s cubic-bezier(.68, -.55, .265, 1.55), suitPulse 2s ease-in-out infinite .45s;
        }

        @keyframes suitBounce {
            0% {
                transform: scale(1);
            }

            55% {
                transform: scale(1.35);
            }

            100% {
                transform: scale(1.28);
            }
        }

        @keyframes suitPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 12px var(--gold-glow)) brightness(1.12);
            }

            50% {
                filter: drop-shadow(0 0 22px rgba(201, 162, 39, .9)) brightness(1.24);
            }
        }

        /* Signal count */
        .signal-count-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .signal-count-card {
            position: relative;
            width: 74px;
            height: 74px;
            background: rgba(201, 162, 39, 0.07);
            border: 1px solid rgba(201, 162, 39, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 18px rgba(201, 162, 39, 0.18), inset 0 0 12px rgba(0, 0, 0, 0.5);
        }

        .signal-count-card img {
            width: 55%;
            height: 55%;
            object-fit: contain;
            opacity: 0.35;
            position: absolute;
        }

        .signal-count-value {
            position: relative;
            font-size: 26px;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--gold-bright);
            text-shadow: 0 0 12px var(--gold-glow);
            z-index: 1;
        }

        /* Clear btn */
        .signal-clear-btn {
            padding: 0;
            background: rgba(201, 162, 39, 0.07);
            border: 1px solid rgba(201, 162, 39, 0.28);
            border-radius: 8px;
            width: 42px;
            height: 58px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 0;
        }

        .signal-clear-btn img {
            width: 65%;
            height: 65%;
            object-fit: contain;
            filter: brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(5deg);
            opacity: 0.65;
        }

        .signal-clear-btn:hover {
            background: rgba(201, 162, 39, 0.18);
            border-color: rgba(201, 162, 39, 0.55);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        .signal-clear-btn:focus-visible,
        .signal-clear-btn:focus {
            outline: none;
        }

        /* GO button */
        .go-button {
            width: 88px;
            height: 88px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: all .2s;
            filter: drop-shadow(0 0 7px var(--gold-glow));
        }

        .go-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .go-button:hover {
            filter: drop-shadow(0 0 16px rgba(201, 162, 39, .8)) brightness(1.1);
            transform: scale(1.09);
        }

        /* Stop btn */
        .generate-stop-btn {
            width: 60px;
            height: 30px;
            border: 1px solid rgba(230, 57, 70, .55);
            border-radius: 6px;
            background: linear-gradient(180deg, rgba(230, 57, 70, .28), rgba(160, 25, 35, .35));
            color: #ff9090;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            font-family: var(--font-body);
        }

        .generate-stop-btn:hover {
            background: linear-gradient(180deg, rgba(230, 57, 70, .45), rgba(160, 25, 35, .55));
            box-shadow: 0 0 10px rgba(230, 57, 70, .4);
        }

        .generate-stop-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
        }

        /* Recovery inputs */
        .recovery-check-inputs {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 6px 10px;
            align-items: flex-end;
            justify-content: flex-start;
            margin: 0 8px;
            max-width: 760px;
        }

        .recovery-input-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }

        .recovery-input-label {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            text-align: left;
        }

        .recovery-input {
            width: 55px;
            height: 26px;
            padding: 2px 4px;
            border: 1px solid rgba(201, 162, 39, .28);
            border-radius: 4px;
            font-size: 11px;
            text-align: center;
            background: rgba(4, 10, 24, .9);
            color: var(--text-primary);
            transition: all .2s;
            font-family: var(--font-mono);
        }

        .recovery-input:hover {
            border-color: rgba(201, 162, 39, .55);
        }

        .recovery-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, .15);
        }

        .recovery-input::placeholder {
            color: var(--text-dim);
            font-size: 9px;
        }

        .recovery-optimize-btn {
            width: 70px;
            height: 26px;
            border: 1px solid rgba(74, 158, 255, .45);
            border-radius: 6px;
            background: linear-gradient(180deg, rgba(74, 158, 255, .22), rgba(30, 80, 180, .3));
            color: #88ccff;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            font-family: var(--font-body);
        }

        .recovery-optimize-btn:hover {
            background: linear-gradient(180deg, rgba(74, 158, 255, .38), rgba(30, 80, 180, .48));
            box-shadow: 0 0 10px rgba(74, 158, 255, .35);
        }

        .recovery-optimize-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .recovery-rollback-btn {
            width: 70px;
            height: 26px;
            border: 1px solid rgba(100, 116, 139, .35);
            border-radius: 6px;
            background: linear-gradient(180deg, rgba(100, 116, 139, .18), rgba(55, 65, 80, .25));
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            font-family: var(--font-body);
        }

        .recovery-rollback-btn:hover {
            background: linear-gradient(180deg, rgba(100, 116, 139, .32), rgba(55, 65, 80, .4));
            box-shadow: 0 0 8px rgba(100, 116, 139, .28);
        }

        .recovery-rollback-btn:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        /* ── RANK SELECTOR ── */
        .rank-selector-row {
            display: flex;
            gap: 6px;
            margin-bottom: 14px;
            padding: 10px 14px;
            background: var(--bg-panel);
            border: 1px solid rgba(201, 162, 39, .16);
            border-radius: 10px;
            overflow-x: auto;
            backdrop-filter: blur(8px);
        }

        .rank-button {
            flex: 0 0 auto;
            width: 73px;
            height: 104px;
            border: none;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform .3s ease, filter .2s;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, .7));
        }

        .rank-button img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .rank-button:hover {
            transform: translateY(-9px) rotate(-2deg);
            filter: drop-shadow(0 10px 18px rgba(0, 0, 0, .85)) brightness(1.08);
        }

        .rank-button.selected {
            position: relative;
        }

        .rank-button.selected::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('nb/背面.png') center/contain no-repeat;
            z-index: 1;
        }

        .rank-button.selected img {
            opacity: 0;
        }

        /* Violation stats */
        .violation-stats {
            display: flex;
            gap: 10px;
            margin-left: auto;
            align-items: center;
        }

        .violation-card {
            position: relative;
            width: 108px;
            padding: 10px;
            background: rgba(6, 14, 32, .9);
            border: 1px solid rgba(201, 162, 39, .22);
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, .45), inset 0 1px 0 rgba(255, 255, 255, .03);
            text-align: center;
            transition: transform .2s, box-shadow .2s;
        }

        .violation-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(0, 0, 0, .55);
        }

        .violation-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .violation-count {
            font-size: 26px;
            font-weight: 700;
            color: var(--crimson);
            font-family: var(--font-mono);
            line-height: 1;
            text-shadow: 0 0 10px rgba(230, 57, 70, .55);
        }

        .violation-card.no-violation .violation-count {
            color: var(--emerald);
            text-shadow: 0 0 8px rgba(46, 196, 182, .5);
        }

        .violation-card.has-violation {
            border-color: rgba(230, 57, 70, .45);
            background: rgba(28, 6, 10, .92);
            box-shadow: 0 0 14px rgba(230, 57, 70, .18), inset 0 0 8px rgba(230, 57, 70, .05);
        }

        .violation-card.has-violation .violation-count {
            animation: pulseViolation 1.5s ease-in-out infinite;
        }

        @keyframes pulseViolation {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.06);
                opacity: .8;
                text-shadow: 0 0 20px rgba(230, 57, 70, .9);
            }
        }

        .violation-detail {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.4;
            min-height: 28px;
            word-break: break-word;
        }

        .violation-card.no-violation .violation-detail {
            color: var(--emerald);
        }

        .violation-card.has-violation .violation-detail {
            color: var(--crimson);
            font-weight: 600;
        }

        .recovery-card {
            display: inline-block;
            background: rgba(6, 14, 32, .95);
            border: 1px solid rgba(74, 158, 255, .38);
            border-radius: 8px;
            padding: 8px 12px;
            margin-left: 16px;
            vertical-align: middle;
            box-shadow: 0 0 12px rgba(74, 158, 255, .14);
        }

        .recovery-line {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
            white-space: nowrap;
        }

        /* ── MAIN CONTENT ── */
        .main-content {
            display: grid;
            grid-template-columns: 0.6fr 6.4fr 3fr;
            gap: 10px;
            min-height: 500px;
        }

        /* ── LEFT SIDEBAR ── */
        .tool-sidebar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 8px;
            background: var(--bg-panel);
            border: 1px solid rgba(201, 162, 39, .18);
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }

        .tool-sidebar::before,
        .tool-sidebar::after {
            display: none;
        }

        .tool-btn {
            width: 100%;
            padding: 7px 4px;
            background: linear-gradient(160deg, rgba(201, 162, 39, .12), rgba(80, 60, 15, .1));
            border: 1px solid rgba(201, 162, 39, .28);
            border-radius: 6px;
            font-size: 17px;
            font-weight: 600;
            font-family: 'AT01', var(--font-body);
            letter-spacing: 4.5px;
            color: var(--gold-bright);
            text-shadow: 0 0 8px var(--gold-glow);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .35), inset 0 1px 0 rgba(255, 255, 255, .04);
            transition: all .2s ease;
        }

        .tool-btn::before,
        .tool-btn::after {
            display: none;
        }

        .tool-btn:hover {
            background: linear-gradient(160deg, rgba(201, 162, 39, .26), rgba(80, 60, 15, .2));
            border-color: rgba(201, 162, 39, .58);
            box-shadow: 0 0 16px var(--gold-glow), 0 4px 12px rgba(0, 0, 0, .4);
            transform: translateY(-2px);
        }

        .tool-btn:active {
            transform: translateY(0);
        }

        .tool-btn:disabled {
            opacity: .32;
            cursor: not-allowed;
            color: var(--text-dim);
            text-shadow: none;
            transform: none;
        }

        .tool-btn:disabled:hover {
            transform: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, .3);
            background: linear-gradient(160deg, rgba(201, 162, 39, .06), rgba(80, 60, 15, .05));
        }

        .swap-preview-toggle {
            display: flex;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
            gap: 6px;
            margin-top: 4px;
            padding: 4px;
        }

        .swap-preview-toggle input {
            width: 14px;
            height: 14px;
            accent-color: var(--gold);
        }

        /* ── TABLE ── */
        .table-container {
            position: relative;
            padding: 10px;
            background: var(--bg-panel);
            border: 1px solid rgba(201, 162, 39, .14);
            border-radius: 12px;
            backdrop-filter: blur(6px);
        }

        .rounds-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
            position: relative;
            z-index: 2;
        }

        .rounds-table th {
            color: var(--gold);
            font-weight: 600;
            padding: 6px 4px;
            text-align: center;
            border: none;
            border-bottom: 1px solid rgba(201, 162, 39, .28);
            letter-spacing: 2px;
            font-size: 16px;
            font-family: var(--font-body);
            text-shadow: 0 0 6px var(--gold-glow);
        }

        .rounds-table td {
            padding: 2px 2px;
            text-align: center;
            border: none;
            border-bottom: 1px solid rgba(201, 162, 39, .06);
            font-size: 16px;
            background: transparent;
            color: var(--text-primary);
            font-family: var(--font-body);
        }

        .rounds-table tbody tr:nth-child(even) td {
            background: var(--bg-row-alt);
        }

        .rounds-table tbody tr:hover td {
            background: rgba(201, 162, 39, .06);
        }

        .rounds-table tr.violation-row td {
            background: rgba(230, 57, 70, .1) !important;
            border-bottom: 2px solid rgba(230, 57, 70, .45);
        }

        .rounds-table tr.violation-row:hover td {
            background: rgba(230, 57, 70, .16) !important;
        }

        .rounds-table tr.swap-banker-six-row td {
            background: rgba(46, 196, 182, .08) !important;
            border-bottom: 2px solid rgba(46, 196, 182, .28);
        }
    </style>
</head>

<body>
    <!-- ========== 裝飾元素 ========== -->
    <div class="seigaiha-bottom"></div> <!-- 底部青海波 -->
    <div class="pine-decoration"></div> <!-- 左下松樹 -->
    <div class="sakura-decoration"></div> <!-- 右上櫻花 -->

    <!-- ========== 主容器 ========== -->
    <div class="container">

        <!-- ===== 第一行：花色 + 訊號張數 + 清空 + GO + 圓餅圖 + 切牌 ===== -->
        <div class="top-controls">
            <!-- 花色選擇器 -->
            <div class="suit-selector">
                <a class="suit-button" data-value="♠"><img src="suit/黑桃.png" alt="黑桃"></a>
                <a class="suit-button" data-value="♥"><img src="suit/愛心.png" alt="愛心"></a>
                <a class="suit-button" data-value="♦"><img src="suit/方塊.png" alt="方塊"></a>
                <a class="suit-button" data-value="♣"><img src="suit/梅花.png" alt="梅花"></a>
            </div>

            <!-- 訊號張數（數字疊在卷軸圖片上） -->
            <div class="signal-count-wrapper">
                <div class="signal-count-card">
                    <img src="suit/張數.png" alt="訊號牌張數">
                    <span id="signalCardCount" class="signal-count-value">0</span>
                </div>
            </div>

            <!-- 清空按鈕（卷軸圖片） -->
            <button type="button" class="signal-clear-btn" onclick="clearSignalSelections()" aria-label="清除訊號牌">
                <img src="suit/清除.png" alt="清除">
            </button>

            <!-- GO 按鈕 -->
            <button class="go-button" id="generateBtn">
                <img src="suit/GO.png" alt="GO">
            </button>
            <button type="button" id="stopGenerateBtn" class="generate-stop-btn" disabled
                onclick="stopGenerateShoe()">停止</button>

            <!-- 回復分析檢查條件設定 -->
            <div class="recovery-check-inputs">
                <div class="recovery-input-item">
                    <label class="recovery-input-label">平均上限</label>
                    <input type="number" id="avgRecoveryLimit" class="recovery-input" step="0.1" min="0" value="4"
                        placeholder="0=關閉">
                </div>
                <div class="recovery-input-item">
                    <label class="recovery-input-label">16局上限</label>
                    <input type="number" id="range16Limit" class="recovery-input" min="0" placeholder="空白=不檢查">
                </div>
                <div class="recovery-input-item">
                    <label class="recovery-input-label">莊/閒上限</label>
                    <input type="number" id="maxSideLimit" class="recovery-input" min="0" value="46"
                        placeholder="空白=不檢查">
                </div>
                <div class="recovery-input-item">
                    <label class="recovery-input-label">和局上限</label>
                    <input type="number" id="maxTieLimit" class="recovery-input" min="0" value="4" placeholder="空白=不檢查">
                </div>
                <div class="recovery-input-item">
                    <label class="recovery-input-label">4張局上限%</label>
                    <input type="number" id="maxFourCardRate" class="recovery-input" min="0" max="100" step="0.1"
                        value="38.5" placeholder="空白=不檢查">
                </div>
                <div class="recovery-input-item">
                    <label class="recovery-input-label">範圍起(局)</label>
                    <input type="number" id="recoveryWindowStart" class="recovery-input" min="1" placeholder="自動">
                </div>
                <div class="recovery-input-item">
                    <label class="recovery-input-label">範圍迄(局)</label>

    <script>
        // ========== 花色按鈕點擊事件 ==========
        document.querySelectorAll('.suit-button').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                button.classList.toggle('selected');
                // 更新訊號牌張數
                if (typeof window.updateSignalCardCount === 'function') {
                    window.updateSignalCardCount();
                }
            });
        });

        // ========== 數字牌按鈕點擊事件 ==========
        document.querySelectorAll('.rank-button').forEach(button => {
            button.addEventListener('click', (e) => {
                e.preventDefault();
                button.classList.toggle('selected');

                // 同步更新對應的 checkbox
                const value = button.dataset.value;
                const checkbox = document.querySelector(`.rank-checkbox[value="${value}"]`);
                if (checkbox) {
                    checkbox.checked = button.classList.contains('selected');
                    checkbox.dispatchEvent(new Event('change', { bubbles: true }));
                }
            });
        });

        // ========== 獲取選中的花色 ==========
        function getSelectedSuitsFromButtons() {
            const selectedButtons = document.querySelectorAll('.suit-button.selected');
            return Array.from(selectedButtons).map(btn => btn.dataset.value);
        }

        // ========== 更新訊號牌張數計算 ==========
        if (typeof window.updateSignalCardCount === 'undefined') {
            window.updateSignalCardCount = function () {
                const suits = getSelectedSuitsFromButtons();
                const ranks = Array.from(document.querySelectorAll('.rank-checkbox:checked')).map(cb => cb.value);
                const totalCards = suits.length * ranks.length * 8;
                const countElement = document.getElementById('signalCardCount');
                if (countElement) {
                    countElement.textContent = totalCards;
                }
            };
        }

        // ========== 監聽 checkbox 變化 ==========
        document.querySelectorAll('.rank-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                if (typeof window.updateSignalCardCount === 'function') {
                    window.updateSignalCardCount();
                }
            });
        });

        // ========== 圓餅圖中心數字隱藏邏輯 ==========
        function updateCircleCenterVisibility() {
            const circleTotal = document.getElementById('circleTotal');
            const circleCenter = document.querySelector('.result-circle-center');
            if (circleTotal && circleCenter) {
                const totalValue = parseInt(circleTotal.textContent) || 0;
                if (totalValue === 0) {
                    circleCenter.classList.add('hidden');
                } else {
                    circleCenter.classList.remove('hidden');
                }
            }
        }

        // 初始化檢查
        updateCircleCenterVisibility();

        // 監聽數字變化
        const circleTotal = document.getElementById('circleTotal');
        if (circleTotal) {
            const observer = new MutationObserver(updateCircleCenterVisibility);
            observer.observe(circleTotal, {
                childList: true,
                characterData: true,
                subtree: true
            });
        }

        // ========== 違規統計初始化 ==========
        document.addEventListener('DOMContentLoaded', function () {
            const violationCards = document.querySelectorAll('.violation-card');
            violationCards.forEach(card => {
                card.classList.add('no-violation');
            });

            if (typeof updateViolationUI === 'function') {
                updateViolationUI(null);
            }
        });
    </script>
