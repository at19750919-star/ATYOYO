        }

        // 備註功能函式
        function selectCardForNote(cardIndex) {
          selectedCardIndex = cardIndex;
          const selectedCardDisplay = document.getElementById(
            "selected-card-display",
          );
          const selectedCardText =
            document.getElementById("selected-card-text");

          if (selectedCardDisplay && selectedCardText && fullDeck[cardIndex]) {
            const card = fullDeck[cardIndex];
            const cardDesc = `第 ${cardIndex + 1} 張 - ${card.back === "R" ? "紅" : "黑"}${card.rank}`;
            selectedCardText.textContent = cardDesc;
            selectedCardDisplay.style.display = "block";
          }

          // 啟用備註控制
          if (notesInput) notesInput.disabled = false;
          if (notesAddBtn) notesAddBtn.disabled = false;
          if (notesHighlightBtn) notesHighlightBtn.disabled = false;

          // 如果已有備註，顯示在輸入框
          if (cardNotes[cardIndex] && cardNotes[cardIndex].text) {
            notesInput.value = cardNotes[cardIndex].text;
          } else {
            notesInput.value = "";
          }
        }

        function updateNotesDisplay() {
          if (!notesDisplay) return;

          const noteKeys = Object.keys(cardNotes);
          if (noteKeys.length === 0) {
            notesDisplay.innerHTML = "尚無備註卡牌";
            notesDisplay.classList.add("empty");
            return;
          }

          notesDisplay.classList.remove("empty");
          let html = "";

          noteKeys
            .sort((a, b) => parseInt(a) - parseInt(b))
            .forEach((index) => {
              const note = cardNotes[index];
              const card = fullDeck[index];
              if (!card) return;

              const cardDesc = `第 ${parseInt(index) + 1} 張 - ${card.back === "R" ? "紅" : "黑"}${card.rank}`;
              const highlightClass = note.highlighted ? " highlighted" : "";
              html += `<div class="note-item${highlightClass}">`;
              html += `<div class="note-card-info">${cardDesc}</div>`;
              if (note.text) {
                html += `<div class="note-text">${escapeHTML(note.text)}</div>`;
              }
              html += `</div>`;
            });

          notesDisplay.innerHTML = html;
        }

        function escapeHTML(text) {
          const div = document.createElement("div");
          div.textContent = text;
          return div.innerHTML;
        }

        function addCardNote() {
          if (selectedCardIndex === null) {
            alert("請先點擊卡牌格子選擇要備註的卡牌");
            return;
          }

          const text = notesInput.value.trim();

          if (!text) {
            alert("請輸入備註文字");
            return;
          }

          if (!cardNotes[selectedCardIndex]) {
            cardNotes[selectedCardIndex] = { text: "", highlighted: false };
          }

          cardNotes[selectedCardIndex].text = text;
          notesInput.value = "";

          // 更新格子顯示
          updateCardNoteMarker(selectedCardIndex);
          updateNotesDisplay();
        }

        function toggleCardHighlight() {
          if (selectedCardIndex === null) {
            alert("請先點擊卡牌格子選擇要高亮的卡牌");
            return;
          }

          if (!cardNotes[selectedCardIndex]) {
            cardNotes[selectedCardIndex] = { text: "", highlighted: false };
          }

          cardNotes[selectedCardIndex].highlighted =
            !cardNotes[selectedCardIndex].highlighted;

          // 更新格子顯示
          updateCardNoteMarker(selectedCardIndex);
          updateNotesDisplay();
        }

        function clearAllNotes() {
          if (Object.keys(cardNotes).length === 0) {
            return;
          }

          if (confirm("確定要清除所有卡牌備註和高亮嗎？")) {
            cardNotes = {};
            selectedCardIndex = null;
            if (notesInput) {
              notesInput.value = "";
              notesInput.disabled = true;
            }
            if (notesAddBtn) notesAddBtn.disabled = true;
            if (notesHighlightBtn) notesHighlightBtn.disabled = true;
            const selectedCardDisplay = document.getElementById(
              "selected-card-display",
            );
            if (selectedCardDisplay) selectedCardDisplay.style.display = "none";

            // 移除所有格子的標記
            gridCells.forEach((cell) => {
              cell.classList.remove("has-note", "note-highlighted");
            });

            updateNotesDisplay();
          }
        }

        function updateCardNoteMarker(cardIndex) {
          const cell = gridCells[cardIndex];
          if (!cell) return;

          const note = cardNotes[cardIndex];

          if (note) {
            if (note.text || note.highlighted) {
              cell.classList.add("has-note");
            } else {
              cell.classList.remove("has-note");
              delete cardNotes[cardIndex];
            }

            if (note.highlighted) {
              cell.classList.add("note-highlighted");
            } else {
              cell.classList.remove("note-highlighted");
            }
          } else {
            cell.classList.remove("has-note", "note-highlighted");
          }
        }

        function resetGridPanel() {
          gridCells = [];
          gridValues = [];
          searchHighlightCells = [];
          activeGridCell = null;
          activeRowHighlightIndex = null;

          // 重置備註
          cardNotes = {};
          selectedCardIndex = null;
          if (notesInput) {
            notesInput.value = "";
            notesInput.disabled = true;
          }
          if (notesAddBtn) notesAddBtn.disabled = true;
          if (notesHighlightBtn) notesHighlightBtn.disabled = true;
          const selectedCardDisplay = document.getElementById(
            "selected-card-display",
          );
          if (selectedCardDisplay) selectedCardDisplay.style.display = "none";
          updateNotesDisplay();

          if (gridContainer) {
            gridContainer.innerHTML =
              '<div class="grid-placeholder">尚未載入 Excel 卡序</div>';
          }
          if (gridSearchFeedback) {
            gridSearchFeedback.textContent = "載入資料後可搜尋指定牌序。";
          }
          updateGridSearchAvailability(false);
        }

        function prepareGridPanel(deck) {
          currentDeck = deck;
          clearSearchHighlights();
          renderDeckGrid(deck);
          updateGridCellSize();
          updateGridSearchAvailability(Array.isArray(deck) && deck.length > 0);
          if (gridSearchInput) {
            gridSearchInput.value = "";
          }
          if (gridSearchFeedback) {
            gridSearchFeedback.textContent =
              deck.length > 0 ? "" : "載入資料後可搜尋指定牌序。";
          }
        }

        function renderDeckGrid(deck) {
          if (!gridContainer) return;
          gridContainer.innerHTML = "";
          // 移除舊的點擊事件
          gridContainer.removeEventListener("click", handleCellClick);
          gridContainer.removeEventListener("dblclick", handleRowDoubleClick);
          activeRowHighlightIndex = null;
          if (!Array.isArray(deck) || deck.length === 0) {
            gridContainer.innerHTML =
              '<div class="grid-placeholder">尚未載入 Excel 卡序</div>';
            gridCells = [];
            gridValues = [];
            return;
          }
          gridCells = new Array(deck.length);
          gridValues = new Array(deck.length);
          let cardIndex = 0;
          const rowCount = Math.ceil(deck.length / GRID_COLS);
          for (let row = 0; row < rowCount; row++) {
            const rowLabel = document.createElement("div");
            rowLabel.className = "grid-row-label";
            const rowStart = row * GRID_COLS + 1;
            const rowEnd = Math.min(rowStart + GRID_COLS - 1, deck.length);
            rowLabel.textContent = `${rowStart}~${rowEnd}`;
            rowLabel.dataset.rowIndex = row;
            gridContainer.appendChild(rowLabel);

            for (let col = 0; col < GRID_COLS; col++) {
              if (cardIndex < deck.length) {
                const card = deck[cardIndex];
                const cell = document.createElement("div");
                cell.className = "grid-cell";
                const value = formatCardValueForGrid(card);
                gridValues[cardIndex] = value;
                cell.textContent = value;
                cell.dataset.cardIndex = cardIndex;
                cell.dataset.rowIndex = row;
                const backColor = card.back || card.back_color;
                if (backColor === "R") cell.classList.add("card-red");
                if (backColor === "B") cell.classList.add("card-blue");
                if (card.isSignal) cell.classList.add("signal-card");
                const rankUpper = String(card.rank).toUpperCase();
                if (rankUpper === 'A' || rankUpper === '2') cell.classList.add("rank-a2");
                gridContainer.appendChild(cell);
                gridCells[cardIndex] = cell;
                cardIndex += 1;
              } else {
                const filler = document.createElement("div");
                filler.className = "grid-cell empty-cell";
                filler.dataset.rowIndex = row;
                gridContainer.appendChild(filler);
              }
            }
          }
          // 加入點擊事件（用於標記）
          gridContainer.addEventListener("click", handleCellClick);
          gridContainer.addEventListener("dblclick", handleRowDoubleClick);
        }

        function formatCardValueForGrid(card) {
          if (!card || !card.rank) return "";
          const rank = String(card.rank).toUpperCase();
          if (rank === "A") return "1";
          if (["10", "J", "Q", "K"].includes(rank)) return "0";
          const parsed = parseInt(rank, 10);
          return Number.isNaN(parsed) ? rank : String(parsed);
        }

        function cardPointFromRank(rank) {
          if (rank == null) return 0;
          const upper = String(rank).toUpperCase();
          if (upper === "A") return 1;
          if (["10", "J", "Q", "K"].includes(upper)) return 0;
          const parsed = parseInt(upper, 10);
          return Number.isNaN(parsed) ? 0 : parsed;
        }

        function updateGridSearchAvailability(isReady) {
          if (gridSearchInput) gridSearchInput.disabled = !isReady;
          if (gridSearchBtn) gridSearchBtn.disabled = !isReady;
          if (gridSearchClearBtn) gridSearchClearBtn.disabled = !isReady;
          if (cardNumberInput) {
            cardNumberInput.disabled = !isReady;
            if (isReady && fullDeck.length)
              cardNumberInput.max = fullDeck.length;
          }
          if (cardNumberClearBtn) cardNumberClearBtn.disabled = !isReady;
          if (cardHighlightBtn) cardHighlightBtn.disabled = !isReady;
          if (cardBackSelect) cardBackSelect.disabled = !isReady;
          if (cardRankSelect) cardRankSelect.disabled = !isReady;
          if (cardSignalSelect) cardSignalSelect.disabled = !isReady;
          if (cardBackRankClearBtn) cardBackRankClearBtn.disabled = !isReady;
          if (cardBackRankSearchBtn) cardBackRankSearchBtn.disabled = !isReady;
          if (clearAllMarksBtn) clearAllMarksBtn.disabled = !isReady;
        }

        function clearSearchHighlights() {
          if (
            Array.isArray(searchHighlightCells) &&
            searchHighlightCells.length
          ) {
            searchHighlightCells.forEach((cell) => {
              if (cell) cell.classList.remove("grid-cell-search-hit");
            });
          }
          searchHighlightCells = [];
        }

        function handleGridSearch() {
          if (!fullDeck.length || !gridValues.length) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = "尚未載入牌組，無法搜尋。";
            return;
          }
          if (!gridSearchInput) return;
          const raw = gridSearchInput.value.trim();
          clearSearchHighlights();
          if (!raw) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent =
                "請輸入要搜尋的數字（至少3個）。";
            return;
          }
          // 支援兩種格式：1) 空格分隔 "8 7 5 1"  2) 連續數字 "8751"
          let tokens = raw.replace(/[,;]+/g, " ").split(/\s+/).filter(Boolean);
          // 如果只有一個 token 且長度 >= 3，則拆成單個字符
          if (tokens.length === 1 && tokens[0].length >= 3) {
            tokens = tokens[0].split("");
          }
          if (tokens.length < 3) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent =
                "請至少輸入三個數字，避免結果過多。";
            return;
          }
          const matches = [];
          for (let i = 0; i <= gridValues.length - tokens.length; i++) {
            let match = true;
            for (let j = 0; j < tokens.length; j++) {
              if (gridValues[i + j] !== tokens[j]) {
                match = false;
                break;
              }
            }
            if (match) matches.push(i);
          }
          if (!matches.length) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = `找不到「${tokens.join(" ")}」`;
            return;
          }
          matches.forEach((startIdx) => {
            for (let offset = 0; offset < tokens.length; offset++) {
              const cell = gridCells[startIdx + offset];
              if (cell) {
                cell.classList.add("grid-cell-search-hit");
                searchHighlightCells.push(cell);
              }
            }
          });
          const preview = matches
            .slice(0, 3)
            .map((idx) => {
              const row = Math.floor(idx / GRID_COLS) + 1;
              const col = (idx % GRID_COLS) + 1;
              const cardNo = idx + 1;
              return `#${cardNo}(列${row},欄${col})`;
            })
            .join("、");
          if (gridSearchFeedback) {
            gridSearchFeedback.textContent = `找到 ${matches.length} 處，位置如：${preview}`;
          }
          const firstCell = gridCells[matches[0]];
          if (firstCell) {
            scrollCellIntoView(firstCell);
          }
        }

        // 定位張數功能
        function handleCardNumberHighlight() {
          if (!fullDeck.length || !gridCells.length) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = "尚未載入牌組，無法定位。";
            return;
          }
          if (!cardNumberInput) return;
          const cardNum = parseInt(cardNumberInput.value, 10);
          clearSearchHighlights();
          if (Number.isNaN(cardNum) || cardNum < 1) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = "請輸入有效的張數（1 起）";
            return;
          }
          if (cardNum > fullDeck.length) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = `超出範圍，最大為 ${fullDeck.length}`;
            return;
          }
          const idx = cardNum - 1;
          const cell = gridCells[idx];
          if (cell) {
            cell.classList.add("grid-cell-search-hit");
            searchHighlightCells.push(cell);
            scrollCellIntoView(cell);
            const card = fullDeck[idx];
            const backText = card.back === "R" ? "紅" : "黑";
            const signalText = card.isSignal ? " [訊號]" : "";
            // 顯示前後5張
            const context = getCardContext(idx, 5);
            if (gridSearchFeedback) {
              gridSearchFeedback.innerHTML = `<strong>第 ${cardNum} 張：${backText}${card.rank}${card.suit}${signalText}</strong><br>${context}`;
            }
          }
        }

        // 卡背+點數搜尋功能
        function handleCardBackRankSearch() {
          if (!fullDeck.length || !gridCells.length) {
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = "尚未載入牌組，無法搜尋。";
            return;
          }
          clearSearchHighlights();
          const selectedBack = cardBackSelect ? cardBackSelect.value : "R";
          const selectedRank = cardRankSelect ? cardRankSelect.value : "1";
          const selectedSignal = cardSignalSelect
            ? cardSignalSelect.value
            : "all";
          const backText = selectedBack === "R" ? "紅" : "黑";
          const rankText =
            selectedRank === "1"
              ? "A"
              : selectedRank === "0"
                ? "0(10/J/Q/K)"
                : selectedRank;
          const signalText =
            selectedSignal === "signal"
              ? "訊號"
              : selectedSignal === "non-signal"
                ? "非訊號"
                : "全部";

          // 找出所有符合的牌（先統計總數，再依訊號篩選）
          const matches = [];
          let totalMatches = 0;
          let signalMatches = 0;
          let nonSignalMatches = 0;
          fullDeck.forEach((card, idx) => {
            const cardRankValue = formatCardValueForGrid(card);
            if (card.back === selectedBack && cardRankValue === selectedRank) {
              totalMatches += 1;
              if (card.isSignal) signalMatches += 1;
              else nonSignalMatches += 1;
              if (selectedSignal === "signal" && !card.isSignal) return;
              if (selectedSignal === "non-signal" && card.isSignal) return;
              matches.push(idx);
            }
          });

          if (!matches.length) {
            if (gridSearchFeedback) {
              gridSearchFeedback.textContent = `找不到「${backText}${rankText} / ${signalText}」`;
            }
            return;
          }

          // 亮高所有符合的牌
          matches.forEach((idx) => {
            const cell = gridCells[idx];
            if (cell) {
              cell.classList.add("grid-cell-search-hit");
              searchHighlightCells.push(cell);
            }
          });

          // 顯示結果：每個位置的前後5張
          let resultHtml = `<strong>找到 ${matches.length} 張「${backText}${rankText} / ${signalText}」</strong><br>`;
          resultHtml += `<span style="opacity:0.9;">總計 ${totalMatches} 張（訊號 ${signalMatches} / 非訊號 ${nonSignalMatches}）</span><br>`;
          matches.forEach((idx, i) => {
            const cardNum = idx + 1;
            const context = getCardContext(idx, 5);
            resultHtml += `<div style="margin: 8px 0; padding: 5px; background: rgba(255,255,255,0.1); border-radius: 4px;"><strong>#${i + 1} 第${cardNum}張：</strong> ${context}</div>`;
          });

          if (gridSearchFeedback) {
            gridSearchFeedback.innerHTML = resultHtml;
          }

          // 捲動到第一個
          const firstCell = gridCells[matches[0]];
          if (firstCell) {
            scrollCellIntoView(firstCell);
          }
        }

        // 取得某張牌前後 N 張的文字描述
        function getCardContext(idx, range) {
          const start = Math.max(0, idx - range);
          const end = Math.min(fullDeck.length - 1, idx + range);
          let result = "";
          for (let i = start; i <= end; i++) {
            const card = fullDeck[i];
            const val = formatCardValueForGrid(card);
            const backColor = card.back === "R" ? "#FFFF00" : "#00FFFF";
            const textColor = "#1e293b";
            const isTarget = i === idx;
            const style = isTarget
              ? `background:${backColor};color:${textColor};padding:2px 4px;border-radius:3px;font-weight:bold;border:2px solid ${card.back === "R" ? "#ff6b00" : "#9333ea"};`
              : `background:${backColor};color:${textColor};padding:2px 4px;border-radius:3px;`;
            result += `<span style="${style}">${val}</span> `;
          }
          return result.trim();
        }

        // 點擊格子標記功能
        function handleCellClick(event) {
          const cell = event.target;
          if (
            !cell.classList.contains("grid-cell") ||
            cell.classList.contains("empty-cell")
          )
            return;

          const cardIndex = parseInt(cell.dataset.cardIndex, 10);
          if (!isNaN(cardIndex)) {
            // 點擊卡牌選擇來備註
            selectCardForNote(cardIndex);
          }

          // 保留原有的標記功能
          cell.classList.toggle("grid-cell-marked");
        }

        function clearRowHighlight() {
          if (activeRowHighlightIndex === null || !gridContainer) return;
          const prevRowCells = gridContainer.querySelectorAll(
            `[data-row-index="${activeRowHighlightIndex}"]`,
          );
          prevRowCells.forEach((rowCell) => {
            rowCell.classList.remove("grid-row-highlight");
          });
          activeRowHighlightIndex = null;
        }

        function toggleRowHighlight(rowIndex) {
          if (!gridContainer) return;
          if (activeRowHighlightIndex === rowIndex) {
            clearRowHighlight();
            return;
          }
          clearRowHighlight();
          const rowCells = gridContainer.querySelectorAll(
            `[data-row-index="${rowIndex}"]`,
          );
          rowCells.forEach((rowCell) => {
            rowCell.classList.add("grid-row-highlight");
          });
          activeRowHighlightIndex = rowIndex;
        }

        function handleRowDoubleClick(event) {
          const cell = event.target;
          const isGridCell = cell.classList.contains("grid-cell");
          const isRowLabel = cell.classList.contains("grid-row-label");
          if (
            (!isGridCell && !isRowLabel) ||
            cell.classList.contains("empty-cell")
          )
            return;

          const rowIndex = parseInt(cell.dataset.rowIndex, 10);
          if (Number.isNaN(rowIndex)) return;
          toggleRowHighlight(rowIndex);
        }

        // 清除所有標記（但保留備註標記）
        function clearAllMarks() {
          gridCells.forEach((cell) => {
            if (cell) cell.classList.remove("grid-cell-marked");
          });
          if (gridSearchFeedback)
            gridSearchFeedback.textContent = "已清除所有標記（備註保留）";
        }

        function scrollCellIntoView(cell) {
          if (!gridScrollContainer || !cell) return;
          const containerRect = gridScrollContainer.getBoundingClientRect();
          const cellRect = cell.getBoundingClientRect();
          if (
            cellRect.top < containerRect.top ||
            cellRect.bottom > containerRect.bottom
          ) {
            const offset =
              cellRect.top - containerRect.top - containerRect.height / 3;
            gridScrollContainer.scrollTop += offset;
          }
        }

        function highlightCurrentCardInGrid() {
          if (!gridCells || !gridCells.length) return;
          if (activeGridCell) {
            activeGridCell.classList.remove("grid-cell-active");
            activeGridCell = null;
          }
          if (nextRowHintCell) {
            nextRowHintCell.classList.remove("grid-cell-next-row-hint");
            nextRowHintCell = null;
          }
          if (Array.isArray(currentRowCells) && currentRowCells.length) {
            currentRowCells.forEach((cell) => {
              if (cell) cell.classList.remove("grid-cell-current-row");
            });
            currentRowCells = [];
          }
          if (currentIndex < 0 || currentIndex >= gridCells.length) return;
          const cell = gridCells[currentIndex];
          if (cell) {
            cell.classList.add("grid-cell-active");
            activeGridCell = cell;
            scrollCellIntoView(cell);
          }
          const rowStart = Math.floor(currentIndex / GRID_COLS) * GRID_COLS;
          const rowEnd = Math.min(rowStart + GRID_COLS, gridCells.length);
          for (let i = rowStart; i < rowEnd; i++) {
            const rowCell = gridCells[i];
            if (rowCell) {
              rowCell.classList.add("grid-cell-current-row");
              currentRowCells.push(rowCell);
            }
          }
          if (
            currentIndex % GRID_COLS === GRID_COLS - 1 &&
            currentIndex + 1 < gridCells.length
          ) {
            const hintCell = gridCells[currentIndex + 1];
            if (hintCell) {
              hintCell.classList.add("grid-cell-next-row-hint");
              nextRowHintCell = hintCell;
            }
          }
        }

        function clearActiveGridHighlight() {
          if (activeGridCell) {
            activeGridCell.classList.remove("grid-cell-active");
            activeGridCell = null;
          }
          if (nextRowHintCell) {
            nextRowHintCell.classList.remove("grid-cell-next-row-hint");
            nextRowHintCell = null;
          }
          if (Array.isArray(currentRowCells) && currentRowCells.length) {
            currentRowCells.forEach((cell) => {
              if (cell) cell.classList.remove("grid-cell-current-row");
            });
            currentRowCells = [];
          }
        }

        // 檔案管理功能
        function toggleFileManager() {
          if (
            fileManager.style.display === "none" ||
            !fileManager.style.display
          ) {
            fileManager.style.display = "block";
            loadSavedFiles();
            updateRecentFilesList();
          } else {
            fileManager.style.display = "none";
          }
        }

        function addToRecentFiles(fileName) {
          if (!fileName) return;

          let recentFiles = JSON.parse(
            localStorage.getItem("recentExcelFiles") || "[]",
          );

          // 移除重複的檔名
          recentFiles = recentFiles.filter((f) => f !== fileName);

          // 加入到最前面
          recentFiles.unshift(fileName);

          // 只保留最近 5 個
          if (recentFiles.length > 5) {
            recentFiles = recentFiles.slice(0, 5);
          }

          localStorage.setItem("recentExcelFiles", JSON.stringify(recentFiles));
        }

        function updateRecentFilesList() {
          if (!recentFilesList) return;

          let recentFiles = JSON.parse(
            localStorage.getItem("recentExcelFiles") || "[]",
          );

          // 如果最近開啟記錄很少，從已讀標記補充
          if (recentFiles.length < 3) {
            const readFiles = getReadFiles();
            const readFileNames = Object.keys(readFiles).sort(
              (a, b) => readFiles[b] - readFiles[a],
            ); // 按時間排序

            readFileNames.forEach((fileName) => {
              if (!recentFiles.includes(fileName)) {
                recentFiles.push(fileName);
              }
            });

            // 只保留前10個
            if (recentFiles.length > 10) {
              recentFiles = recentFiles.slice(0, 10);
            }
          }

          if (recentFiles.length === 0) {
            recentFilesList.innerHTML =
              '<div style="color: #aaa; font-style: italic;">無記錄</div>';
            return;
          }

          recentFilesList.innerHTML = "";

          recentFiles.forEach((fileName, index) => {
            const item = document.createElement("div");
            item.style.cssText =
              "display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.1);";

            const nameSpan = document.createElement("span");
            nameSpan.textContent = `${index + 1}. ${fileName}`;
            nameSpan.style.color = isFileRead(fileName) ? "#888" : "#fff";
            nameSpan.style.textDecoration = isFileRead(fileName)
              ? "line-through"
              : "none";

            const markBtn = document.createElement("button");
            markBtn.textContent = isFileRead(fileName) ? "✓" : "標記";
            markBtn.style.cssText =
              "padding: 2px 8px; font-size: 0.8em; background: " +
              (isFileRead(fileName) ? "#666" : "#4fc3f7") +
              "; border: none; border-radius: 3px; cursor: pointer; color: white;";
            markBtn.onclick = async () => {
              const isRead = isFileRead(fileName);
              const action = isRead ? "unmarkRead" : "markRead";

              try {
                markBtn.disabled = true;
                markBtn.textContent = "...";

                // 調用雲端 API
                const url = `https://script.google.com/macros/s/AKfycbypt3_PnEL5TgdDPaBwg1M5bWAjQMR9dD5Jslicn3eZCtuNSTtqO35RafhQpuX-l9_m/exec?action=${action}&fileName=${encodeURIComponent(fileName)}`;
                const response = await fetch(url);
                const result = await response.json();

                if (result.success) {
                  if (isRead) {
                    unmarkFileAsRead(fileName);
                  } else {
                    markFileAsRead(fileName);
                  }
                  updateRecentFilesList();

                  // 如果是當前檔案，也更新顯示
                  if (fileName === currentFileName) {
                    updateFileReadStatus(isFileRead(fileName));
                  }
                } else {
                  alert("標記失敗：" + (result.error || "未知錯誤"));
                }
              } catch (error) {
                console.error("標記已讀錯誤:", error);
                alert("標記失敗：" + error.message);
              } finally {
                markBtn.disabled = false;
                updateRecentFilesList();
              }
            };

            item.appendChild(nameSpan);
            item.appendChild(markBtn);
            recentFilesList.appendChild(item);
          });
        }

        function saveCurrentFile() {
          if (!currentFileData || !currentFileName) {
            alert("沒有可儲存的檔案");
            return;
          }

          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          const existingIndex = savedFiles.findIndex(
            (file) => file.name === currentFileName,
          );
          const savedFile = {
            id:
              existingIndex >= 0
                ? savedFiles[existingIndex].id
                : Date.now().toString(),
            name: currentFileName,
            data: Array.from(new Uint8Array(currentFileData)),
            savedDate: new Date().toLocaleString("zh-TW"),
            deck: fullDeck,
          };

          // 儲存到 localStorage（同名就更新，避免重複）
          if (existingIndex >= 0) {
            savedFiles[existingIndex] = savedFile;
          } else {
            savedFiles.push(savedFile);
          }
          localStorage.setItem("savedExcelFiles", JSON.stringify(savedFiles));

          alert(
            `檔案 "${currentFileName}" 已${existingIndex >= 0 ? "更新" : "儲存"}`,
          );
          loadSavedFiles();
          updateUploadFileList();
        }

        function loadSavedFiles() {
          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          savedFilesList.innerHTML = "";

          savedFiles.forEach((file) => {
            const fileItem = document.createElement("div");
            fileItem.className = "file-item";
            fileItem.innerHTML = `
                        <div class="file-name" onclick="loadSavedFile('${file.id}')">${file.name}</div>
                        <div class="file-actions">
                            <button class="file-btn rename-btn" onclick="startRename('${file.id}', '${file.name}')">重新命名</button>
                            <button class="file-btn delete-btn" onclick="deleteSavedFile('${file.id}')">刪除</button>
                        </div>
                    `;
            savedFilesList.appendChild(fileItem);
          });
        }

        window.loadSavedFile = function (fileId) {
          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          const file = savedFiles.find((f) => f.id === fileId);

          if (file) {
            currentFileName = file.name;
            currentFileData = new Uint8Array(file.data).buffer;
            fullDeck = Array.isArray(file.deck) ? file.deck : [];
            currentIndex = 0;
            prepareGridPanel(fullDeck);

            uploadContainer.style.display = "none";
            loadingSpinner.style.display = "none";
            assistantContainer.style.display = "flex";
            if (assistantLayout) {
              assistantLayout.classList.add("active");
              assistantLayout.style.display = "flex";
            }
            toggleManagerBtn.style.display = "block";
            saveCurrentBtn.style.display = "block";
            fileManager.style.display = "none";
            setJumpControlsEnabled(true);

            // 顯示檔案名稱
            if (currentFileDisplay && currentFileNameSpan) {
              currentFileDisplay.style.display = "block";
              currentFileNameSpan.textContent = file.name;
              if (markReadBtn) {
                markReadBtn.style.display = "block";
                updateFileReadStatus(isFileRead(file.name));
              }
            }

            updateCardDisplay();
            messageDiv.textContent = `已載入檔案: ${file.name}`;
          }
        };

        window.startRename = function (fileId, currentName) {
          renamingFileId = fileId;
          renameInput.value = currentName;
          renameModal.style.display = "block";
          renameInput.focus();
        };

        function confirmRename() {
          const newName = renameInput.value.trim();
          if (!newName) {
            alert("請輸入檔案名稱");
            return;
          }

          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          const fileIndex = savedFiles.findIndex(
            (f) => f.id === renamingFileId,
          );

          if (fileIndex !== -1) {
            savedFiles[fileIndex].name = newName;
            localStorage.setItem("savedExcelFiles", JSON.stringify(savedFiles));
            loadSavedFiles();
          }

          renameModal.style.display = "none";
          renamingFileId = null;
        }

        function cancelRename() {
          renameModal.style.display = "none";
          renamingFileId = null;
        }

        window.deleteSavedFile = function (fileId) {
          if (confirm("確定要刪除這個檔案嗎？")) {
            const savedFiles = JSON.parse(
              localStorage.getItem("savedExcelFiles") || "[]",
            );
            const filteredFiles = savedFiles.filter((f) => f.id !== fileId);
            localStorage.setItem(
              "savedExcelFiles",
              JSON.stringify(filteredFiles),
            );
            loadSavedFiles();
            updateUploadFileList();
          }
        };

        // 上傳頁面的檔案列表功能
        function showUploadFileList() {
          updateUploadFileList();
          uploadFileList.style.display = "block";
          loadSavedBtn.style.display = "none";
        }

        function hideUploadFileList() {
          uploadFileList.style.display = "none";
          loadSavedBtn.style.display = "block";
        }

        function updateUploadFileList() {
          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          uploadSavedFiles.innerHTML = "";

          if (savedFiles.length === 0) {
            uploadSavedFiles.innerHTML =
              '<div style="text-align: center; color: #aaa; padding: 20px;">尚無已儲存的檔案</div>';
            return;
          }

          savedFiles.forEach((file) => {
            const fileItem = document.createElement("div");
            fileItem.style.cssText =
              "display: flex; align-items: center; justify-content: space-between; padding: 10px; margin: 5px 0; background-color: rgba(255, 255, 255, 0.1); border-radius: 5px; cursor: pointer;";
            fileItem.innerHTML = `
                        <div style="color: #4fc3f7; flex: 1;" onclick="loadSavedFileFromUpload('${file.id}')">${file.name}</div>
                        <div style="font-size: 0.8em; color: #aaa;">${file.savedDate}</div>
                    `;
            uploadSavedFiles.appendChild(fileItem);
          });
        }

        window.loadSavedFileFromUpload = function (fileId) {
          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          const file = savedFiles.find((f) => f.id === fileId);

          if (file) {
            currentFileName = file.name;
            currentFileData = new Uint8Array(file.data).buffer;
            fullDeck = Array.isArray(file.deck) ? file.deck : [];
            currentIndex = 0;

            // 隱藏上傳介面，顯示語音助手
            uploadContainer.style.display = "none";
            loadingSpinner.style.display = "none";
            assistantContainer.style.display = "flex";
            if (assistantLayout) {
              assistantLayout.classList.add("active");
              assistantLayout.style.display = "flex";
            }
            toggleManagerBtn.style.display = "block";
            saveCurrentBtn.style.display = "block";
            setJumpControlsEnabled(true);
            prepareGridPanel(fullDeck);

            updateCardDisplay();
            messageDiv.textContent = `已載入檔案: ${file.name}`;
          }
        };
      });
    </script>

    <!-- 全螢幕網格覆蓋層 -->
    <div id="gridFullscreenOverlay" class="grid-fullscreen-overlay">
      <div class="fullscreen-topbar">
        <span class="fs-title" id="fsGridTitle"></span>
        <button class="fullscreen-close-btn" id="fsCloseBtn">✕ 關閉</button>
      </div>
      <div class="fullscreen-grid-wrap" id="fsGridWrap"></div>
    </div>

    <script>
    (function() {
      const fsOverlay = document.getElementById("gridFullscreenOverlay");
      const fsGridWrap = document.getElementById("fsGridWrap");
      const fsCloseBtn = document.getElementById("fsCloseBtn");
      const fsTitle = document.getElementById("fsGridTitle");
      const openBtn = document.getElementById("gridFullscreenBtn");
      const srcGrid = document.getElementById("grid-preview");
      const srcScroll = document.getElementById("grid-scroll-container");

      if (!openBtn || !fsOverlay) return;

      openBtn.addEventListener("click", () => {
        if (!srcGrid || !srcGrid.children.length) return;
        // 複製整個 grid 到全螢幕
        const clone = srcGrid.cloneNode(true);
        clone.removeAttribute("id");
        clone.classList.add("fs-grid-clone");
        fsGridWrap.innerHTML = "";
        fsGridWrap.appendChild(clone);

        // 設定標題（目前檔名）
        const fnSpan = document.getElementById("current-file-name");
        fsTitle.textContent = fnSpan ? fnSpan.textContent : "";

        // 固定 15 格資料 + 1 標籤 = 16 欄
        const fsCols = 16;
        clone.style.setProperty("--grid-cols", fsCols);

        // 寬度佔滿，高度按比例（正方形格子），可垂直捲動
        const availW = window.innerWidth - 4;
        const colGap = 2;
        const cellSize = Math.floor((availW - (fsCols - 1) * colGap) / fsCols);
        clone.style.setProperty("--grid-row-size", cellSize + "px");

        fsOverlay.classList.add("show");
        document.body.style.overflow = "hidden";
      });

      function closeFs() {
        fsOverlay.classList.remove("show");
        fsGridWrap.innerHTML = "";
        document.body.style.overflow = "";
      }

      fsCloseBtn.addEventListener("click", closeFs);
      fsOverlay.addEventListener("click", (e) => {
        if (e.target === fsOverlay) closeFs();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && fsOverlay.classList.contains("show")) closeFs();
      });
    })();
    </script>
  </body>
</html>
