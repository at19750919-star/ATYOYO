<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <title>理牌助手</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
        transition: background-color 0.3s ease;
        color: white;
        overflow-x: hidden;
        overflow-y: auto;
      }
      #upload-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #121212;
      }
      #upload-label {
        padding: 20px 40px;
        border: 2px dashed #555;
        border-radius: 10px;
        cursor: pointer;
        font-size: 1.5em;
        transition: all 0.2s ease;
      }
      #upload-label:hover {
        background-color: #333;
        border-color: #888;
      }
      #upload-label.drag-over {
        background-color: #444;
        border-color: #4fc3f7;
        transform: scale(1.02);
      }
      #file-input {
        display: none;
      }
      #loading-spinner {
        display: none;
        font-size: 2em;
      }
      #assistant-container {
        display: none;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        justify-content: flex-start;
        align-items: stretch;
        padding: 15px;
        padding-top: 5px;
        box-sizing: border-box;
        overflow-y: auto;
      }
      #assistant-layout {
        display: none;
        flex: 1;
        width: 100%;
        gap: 20px;
        min-height: 0;
      }
      #assistant-layout.active {
        display: flex;
      }
      #grid-panel {
        flex: 1.6;
        background-color: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        min-height: 300px;
        max-height: 100%;
        min-width: 0;
      }
      #playback-panel {
        flex: 0.8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-width: 0;
      }
      #card-display-wrapper {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 30px;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
      }
      #jump-controls-wrapper {
        background-color: rgba(0, 0, 0, 0.3);
        padding: 15px 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        min-width: 200px;
        margin-left: auto;
      }
      #jump-controls-wrapper h4 {
        margin: 0 0 12px 0;
        font-size: 1em;
        color: #4fc3f7;
        text-align: center;
      }
      #jump-controls-wrapper #jump-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #jump-controls-wrapper .jump-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
      }
      #grid-panel .panel-title {
        margin: 0;
        font-size: 1.1em;
      }
      .grid-panel-info {
        font-size: 0.85em;
        color: #cbd5f5;
        margin: 4px 0 0 0;
      }
      .grid-panel-header {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
        flex-wrap: wrap;
        margin-bottom: 8px;
      }
      .grid-panel-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
      }
      #grid-scroll-container {
        flex: 1;
        overflow: auto;
        margin-top: 0px;
        background: rgba(15, 23, 42, 0.7);
        border-radius: 12px;
        padding: 4px 4px 4px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        scroll-padding-top: 12px;
      }
      #grid-scroll-container::-webkit-scrollbar {
        width: 8px;
      }
      #grid-scroll-container::-webkit-scrollbar-thumb {
        background-color: rgba(148, 163, 184, 0.5);
        border-radius: 4px;
      }
      #grid-preview {
        --grid-cols: 16;
        --grid-row-size: 40px;
        --grid-row-gap: 6px;
        --grid-col-gap: 2px;
        --grid-row-step: calc(var(--grid-row-size) + var(--grid-row-gap));
        --grid-row-line-thickness: var(--grid-row-gap);
        --grid-row-odd-color: rgb(245, 188, 228);
        --grid-row-even-color: rgba(36, 50, 251, 0.7);
        --grid-row-band-odd: rgba(15, 23, 42, 0.35);
        --grid-row-band-even: rgba(30, 41, 59, 0.25);
        --grid-col-line-color: rgba(255, 255, 255, 0.16);
        --grid-col-line-thickness: 2px;
        display: grid;
        grid-template-columns: repeat(var(--grid-cols), 1fr);
        grid-auto-rows: var(--grid-row-size);
        row-gap: var(--grid-row-gap);
        column-gap: var(--grid-col-gap);
        position: relative;
        background-image: linear-gradient(
          to bottom,
          var(--grid-row-band-odd) 0,
          var(--grid-row-band-odd) var(--grid-row-size),
          transparent var(--grid-row-size),
          transparent var(--grid-row-step),
          var(--grid-row-band-even) var(--grid-row-step),
          var(--grid-row-band-even)
            calc(var(--grid-row-step) + var(--grid-row-size)),
          transparent calc(var(--grid-row-step) + var(--grid-row-size)),
          transparent calc(var(--grid-row-step) * 2)
        );
        background-size: 100% calc(var(--grid-row-step) * 2);
        background-position: 0 0;
      }
      #grid-preview::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background-image:
          linear-gradient(
            to bottom,
            transparent 0,
            transparent var(--grid-row-size),
            var(--grid-row-odd-color) var(--grid-row-size),
            var(--grid-row-odd-color)
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent calc(var(--grid-row-step) * 2)
          ),
          linear-gradient(
            to bottom,
            transparent 0,
            transparent var(--grid-row-size),
            var(--grid-row-even-color) var(--grid-row-size),
            var(--grid-row-even-color)
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent calc(var(--grid-row-step) * 2)
          );
        background-size:
          100% calc(var(--grid-row-step) * 2),
          100% calc(var(--grid-row-step) * 2);
        background-position:
          0 0,
          0 var(--grid-row-step);
        background-repeat: repeat;
      }
      #grid-preview::after {
        --grid-col-size: calc(
          (100% - (var(--grid-cols) - 1) * var(--grid-col-gap)) /
            var(--grid-cols)
        );
        --grid-col-step: calc(var(--grid-col-size) + var(--grid-col-gap));
        --grid-col-line-offset: calc(
          (var(--grid-col-gap) - var(--grid-col-line-thickness)) / 2
        );
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background-image: linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--grid-col-size) + var(--grid-col-line-offset)),
          var(--grid-col-line-color)
            calc(var(--grid-col-size) + var(--grid-col-line-offset)),
          var(--grid-col-line-color)
            calc(
              var(--grid-col-size) + var(--grid-col-line-offset) +
                var(--grid-col-line-thickness)
            ),
          transparent
            calc(
              var(--grid-col-size) + var(--grid-col-line-offset) +
                var(--grid-col-line-thickness)
            ),
          transparent var(--grid-col-step)
        );
        background-size: var(--grid-col-step) 100%;
        background-repeat: repeat;
      }
      /* 全螢幕網格模式 */
      .grid-fullscreen-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #0f172a;
        flex-direction: column;
      }
      .grid-fullscreen-overlay.show {
        display: flex;
      }
      .grid-fullscreen-overlay .fullscreen-topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 8px;
        background: rgba(30, 41, 59, 0.9);
        flex-shrink: 0;
        height: 32px;
        box-sizing: border-box;
      }
      .grid-fullscreen-overlay .fullscreen-topbar .fs-title {
        color: #94a3b8;
        font-size: 13px;
      }
      .grid-fullscreen-overlay .fullscreen-close-btn {
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 3px 12px;
        font-size: 14px;
        cursor: pointer;
      }
      .grid-fullscreen-overlay .fullscreen-grid-wrap {
        flex: 1;
        overflow-x: hidden;
        overflow-y: auto;
        padding: 0 2px;
      }
      @media (max-width: 768px) {
        .grid-fullscreen-overlay .fullscreen-topbar {
          height: 28px;
          padding: 2px 6px;
        }
        .grid-fullscreen-overlay .fullscreen-close-btn {
          font-size: 12px;
          padding: 2px 8px;
        }
      }
      .fs-grid-clone {
        --grid-cols: 16;
        --grid-row-size: 40px;
        --grid-row-gap: 6px;
        --grid-col-gap: 2px;
        --grid-row-step: calc(var(--grid-row-size) + var(--grid-row-gap));
        --grid-row-line-thickness: var(--grid-row-gap);
        --grid-row-odd-color: rgb(245, 188, 228);
        --grid-row-even-color: rgba(36, 50, 251, 0.7);
        --grid-row-band-odd: rgba(15, 23, 42, 0.35);
        --grid-row-band-even: rgba(30, 41, 59, 0.25);
        --grid-col-line-color: rgba(255, 255, 255, 0.16);
        --grid-col-line-thickness: 2px;
        display: grid;
        grid-template-columns: repeat(var(--grid-cols), 1fr);
        grid-auto-rows: var(--grid-row-size);
        row-gap: var(--grid-row-gap);
        column-gap: var(--grid-col-gap);
        position: relative;
        background-image: linear-gradient(
          to bottom,
          var(--grid-row-band-odd) 0,
          var(--grid-row-band-odd) var(--grid-row-size),
          transparent var(--grid-row-size),
          transparent var(--grid-row-step),
          var(--grid-row-band-even) var(--grid-row-step),
          var(--grid-row-band-even)
            calc(var(--grid-row-step) + var(--grid-row-size)),
          transparent calc(var(--grid-row-step) + var(--grid-row-size)),
          transparent calc(var(--grid-row-step) * 2)
        );
        background-size: 100% calc(var(--grid-row-step) * 2);
        background-position: 0 0;
      }
      .fs-grid-clone::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background-image:
          linear-gradient(
            to bottom,
            transparent 0,
            transparent var(--grid-row-size),
            var(--grid-row-odd-color) var(--grid-row-size),
            var(--grid-row-odd-color)
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent calc(var(--grid-row-step) * 2)
          ),
          linear-gradient(
            to bottom,
            transparent 0,
            transparent var(--grid-row-size),
            var(--grid-row-even-color) var(--grid-row-size),
            var(--grid-row-even-color)
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent
              calc(var(--grid-row-size) + var(--grid-row-line-thickness)),
            transparent calc(var(--grid-row-step) * 2)
          );
        background-size:
          100% calc(var(--grid-row-step) * 2),
          100% calc(var(--grid-row-step) * 2);
        background-position:
          0 0,
          0 var(--grid-row-step);
        background-repeat: repeat;
      }
      .fs-grid-clone::after {
        --grid-col-size: calc(
          (100% - (var(--grid-cols) - 1) * var(--grid-col-gap)) /
            var(--grid-cols)
        );
        --grid-col-step: calc(var(--grid-col-size) + var(--grid-col-gap));
        --grid-col-line-offset: calc(
          (var(--grid-col-gap) - var(--grid-col-line-thickness)) / 2
        );
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background-image: linear-gradient(
          to right,
          transparent 0,
          transparent calc(var(--grid-col-size) + var(--grid-col-line-offset)),
          var(--grid-col-line-color)
            calc(var(--grid-col-size) + var(--grid-col-line-offset)),
          var(--grid-col-line-color)
            calc(
              var(--grid-col-size) + var(--grid-col-line-offset) +
                var(--grid-col-line-thickness)
            ),
          transparent
            calc(
              var(--grid-col-size) + var(--grid-col-line-offset) +
                var(--grid-col-line-thickness)
            ),
          transparent var(--grid-col-step)
        );
        background-size: var(--grid-col-step) 100%;
        background-repeat: repeat;
      }
      .grid-cell {
        border-radius: 6px;
        background-color: rgba(240, 240, 240, 0.08);
        border: 5px solid transparent;
        font-size: calc(var(--grid-row-size) * 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        color: #e2e8f0;
        transition:
          transform 0.1s ease,
          box-shadow 0.1s ease;
        cursor: pointer;
        position: relative;
        z-index: 3;
      }
      .grid-cell.empty-cell {
        background-color: transparent;
        cursor: default;
      }
      .grid-row-label {
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: calc(var(--grid-row-size) * 0.35);
        color: #e2e8f0;
        border-radius: 6px;
        background-color: rgba(15, 23, 42, 0.2);
        border: 2px solid rgba(255, 255, 255, 0.12);
        user-select: none;
        position: relative;
        z-index: 3;
      }
      .grid-row-highlight {
        outline: 3px solid rgba(34, 197, 94, 0.9);
        outline-offset: -3px;
        box-shadow:
          0 0 0 2px rgba(34, 197, 94, 0.6),
          0 0 14px rgba(34, 197, 94, 0.7);
        background-color: rgba(34, 197, 94, 0.18);
      }
      .grid-row-label.grid-row-highlight {
        font-weight: 800;
        color: #dcfce7;
        background-color: rgba(34, 197, 94, 0.22);
      }
      .grid-cell.card-red {
        background-color: #ffff00;
        color: #1e293b;
      }
      .grid-cell.card-blue {
        background-color: #00ffff;
        color: #1e293b;
      }
      .grid-cell.signal-card {
        color: #1e293b;
        font-weight: 700;
      }
      .grid-cell.rank-a2 {
        color: #ff0000 !important;
        font-weight: 700;
      }
      .grid-cell.grid-cell-active {
        background-color: #7dd3fc !important;
        color: #000 !important;
        box-shadow:
          inset 0 0 20 14px #0ea5e9,
          inset 0 0 18px rgba(56, 189, 248, 0.95),
          inset 0 0 36px rgba(56, 189, 248, 0.75);
        transform: scale(1.3);
        z-index: 999;
        font-weight: 800;
      }
      .grid-cell.grid-cell-violation {
        box-shadow: inset 0 0 0 2px #facc15;
      }
      .grid-cell.grid-cell-current-row {
        box-shadow: inset 0 0 0 2px rgba(248 56 56);
      }
      .grid-cell.grid-cell-next-row-hint {
        box-shadow:
          0 0 0 2px rgba(56, 189, 248, 0.8),
          0 0 12px rgba(56, 189, 248, 0.6);
        animation: nextRowHintPulse 0.6s ease-in-out infinite alternate;
      }
      @keyframes nextRowHintPulse {
        from {
          transform: scale(1);
          box-shadow:
            0 0 0 2px rgba(56, 189, 248, 0.6),
            0 0 8px rgba(56, 189, 248, 0.4);
        }
        to {
          transform: scale(1.05);
          box-shadow:
            0 0 0 3px rgba(56, 189, 248, 0.9),
            0 0 16px rgba(56, 189, 248, 0.7);
        }
      }
      /* 亮高樣式：紅卡橘色、黑卡紫色 */
      .grid-cell.card-red.grid-cell-search-hit {
        animation: pulseHighlightOrange 1.2s ease-in-out infinite alternate;
      }
      .grid-cell.card-blue.grid-cell-search-hit {
        animation: pulseHighlightPurple 1.2s ease-in-out infinite alternate;
      }
      .grid-cell.grid-cell-search-hit {
        animation: pulseHighlightOrange 1.2s ease-in-out infinite alternate;
      }
      @keyframes pulseHighlightOrange {
        from {
          box-shadow:
            0 0 0 3px #ff6b00,
            0 0 15px rgba(255, 107, 0, 0.7);
          transform: scale(1.05);
        }
        to {
          box-shadow:
            0 0 0 5px #ff8c00,
            0 0 25px rgba(255, 140, 0, 0.5);
          transform: scale(1.08);
        }
      }
      @keyframes pulseHighlightPurple {
        from {
          box-shadow:
            0 0 0 3px #9333ea,
            0 0 15px rgba(147, 51, 234, 0.7);
          transform: scale(1.05);
        }
        to {
          box-shadow:
            0 0 0 5px #a855f7,
            0 0 25px rgba(168, 85, 247, 0.5);
          transform: scale(1.08);
        }
      }
      /* 標記樣式：紅卡橘色、黑卡紫色 */
      .grid-cell.card-red.grid-cell-marked {
        box-shadow: inset 0 0 0 3px #ff6b00;
      }
      .grid-cell.card-blue.grid-cell-marked {
        box-shadow: inset 0 0 0 3px #9333ea;
      }
      .grid-cell.grid-cell-marked {
        box-shadow: inset 0 0 0 3px #ff6b00;
      }
      .grid-placeholder {
        grid-column: 1 / -1;
        text-align: center;
        color: #94a3b8;
        padding: 20px 0;
      }
      .grid-search {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .grid-search input {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(30, 41, 59, 0.7);
        color: white;
        min-width: 250px;
      }
      .grid-search input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .grid-search button {
        padding: 6px 14px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }
      .grid-search button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .grid-search .clear-btn {
        padding: 6px 10px;
        background: #64748b;
        font-size: 0.9em;
        min-width: auto;
      }
      .grid-search .clear-btn:hover:not(:disabled) {
        background: #ef4444;
      }
      #grid-search-feedback {
        margin-top: 10px;
        font-size: 0.85em;
        color: #e2e8f0;
        min-height: 1.5em;
        max-height: 150px;
        overflow-y: auto;
      }
      #card-display {
        text-align: center;
        user-select: none;
        flex: 0 0 auto;
        margin-left: auto;
        margin-right: 20px;
      }
      #jump-controls-wrapper {
        background-color: rgba(0, 0, 0, 0.3);
        padding: 15px 20px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        min-width: 200px;
      }
      #jump-controls-wrapper h4 {
        margin: 0 0 12px 0;
        font-size: 1em;
        color: #4fc3f7;
        text-align: center;
      }
      #jump-controls-wrapper #jump-controls {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      #jump-controls-wrapper .jump-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: center;
      }
      #rank {
        font-size: 16vw;
        font-weight: bold;
        line-height: 1;
      }
      #suit {
        font-size: 7vw;
        line-height: 1;
      }
      #status,
      #message {
        font-size: 2em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        margin-top: 20px;
      }

      /* 備註功能樣式 */
      #notes-section {
        margin-top: 20px;
        padding: 15px;
        background-color: rgba(0, 0, 0, 0.3);
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      #notes-section h4 {
        margin: 0 0 10px 0;
        font-size: 1.2em;
        color: #4fc3f7;
      }
      #notes-info {
        font-size: 0.9em;
        color: #cbd5f5;
        margin-bottom: 10px;
        line-height: 1.5;
      }
      #notes-display {
        min-height: 80px;
        max-height: 150px;
        overflow-y: auto;
        padding: 10px;
        background: rgba(15, 23, 42, 0.7);
        border-radius: 8px;
        margin-bottom: 10px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        font-size: 0.95em;
        line-height: 1.6;
        color: #e2e8f0;
      }
      #notes-display.empty {
        color: #94a3b8;
        font-style: italic;
      }
      .note-item {
        margin: 5px 0;
        padding: 8px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        border-left: 3px solid #4fc3f7;
      }
      .note-item.highlighted {
        border-left-color: #fbbf24;
        background: rgba(251, 191, 36, 0.15);
      }
      .note-card-info {
        font-weight: 600;
        color: #4fc3f7;
        margin-bottom: 3px;
      }
      .note-text {
        color: #e2e8f0;
      }
      #notes-controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      #notes-input {
        flex: 1;
        min-width: 200px;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.2);

  <body>

    <script>

        // 卡背+點數搜尋
        if (cardBackRankSearchBtn) {
          cardBackRankSearchBtn.addEventListener(
            "click",
            handleCardBackRankSearch,
          );
        }
        // 卡背+點數清除按鈕
        if (cardBackRankClearBtn) {
          cardBackRankClearBtn.addEventListener("click", () => {
            clearSearchHighlights();
            if (gridSearchFeedback)
              gridSearchFeedback.textContent = "已清除搜尋";
          });
        }
        // 清除所有標記
        if (clearAllMarksBtn) {
          clearAllMarksBtn.addEventListener("click", clearAllMarks);
        }

        // 根據容器寬度和列數計算正方形格子大小
        function updateGridCellSize() {
          if (!gridContainer) return;
          const containerWidth = gridContainer.clientWidth;
          if (containerWidth <= 0) return;
          const totalCols = GRID_COLS_WITH_LABEL;
          const colGap = 2;
          const cellSize = Math.floor((containerWidth - (totalCols - 1) * colGap) / totalCols);
          const clamped = Math.max(28, Math.min(60, cellSize));
          gridContainer.style.setProperty("--grid-row-size", clamped + "px");
        }

        // 每行張數設定
        const gridColsInput = document.getElementById("gridColsInput");
        const gridColsApplyBtn = document.getElementById("gridColsApplyBtn");
        if (gridColsApplyBtn) {
          gridColsApplyBtn.addEventListener("click", () => {
            const val = parseInt(gridColsInput.value) || 15;
            const clamped = Math.max(5, Math.min(30, val));
            gridColsInput.value = clamped;
            GRID_COLS = clamped;
            GRID_COLS_WITH_LABEL = GRID_COLS + 1;
            if (gridContainer) {
              gridContainer.style.setProperty("--grid-cols", GRID_COLS_WITH_LABEL);
            }
            updateGridCellSize();
            if (currentDeck && currentDeck.length > 0) {
              renderDeckGrid(currentDeck);
              highlightCurrentCardInGrid();
            }
          });
        }
        window.addEventListener("resize", updateGridCellSize);

        resetGridPanel();

        // 匯出/匯入功能
        const exportDataBtn = document.getElementById("export-data-btn");
        const importDataBtn = document.getElementById("import-data-btn");
        const importFileInput = document.getElementById("import-file-input");

        // 匯出資料
        exportDataBtn.addEventListener("click", function () {
          const savedFiles = JSON.parse(
            localStorage.getItem("savedExcelFiles") || "[]",
          );
          if (savedFiles.length === 0) {
            alert("目前沒有已儲存的檔案");
            return;
          }

          const dataStr = JSON.stringify(savedFiles, null, 2);
          const blob = new Blob([dataStr], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = "saved_excel_files_" + new Date().getTime() + ".json";
          link.click();
          URL.revokeObjectURL(url);
          alert("資料已匯出！請將檔案傳送到手機後匯入。");
        });

        // 點擊匯入按鈕
        importDataBtn.addEventListener("click", function () {
          importFileInput.click();
        });

        // 處理匯入檔案
        importFileInput.addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function (event) {
            try {
              const importedData = JSON.parse(event.target.result);
              if (!Array.isArray(importedData)) {
                throw new Error("檔案格式錯誤");
              }

              // 合併資料（避免覆蓋現有檔案）
              const existingFiles = JSON.parse(
                localStorage.getItem("savedExcelFiles") || "[]",
              );
              const mergedFiles = [...existingFiles];

              importedData.forEach((importFile) => {
                // 檢查是否已存在相同 ID 的檔案
                const exists = mergedFiles.find((f) => f.id === importFile.id);
                if (!exists) {
                  mergedFiles.push(importFile);
                }
              });

              localStorage.setItem(
                "savedExcelFiles",
                JSON.stringify(mergedFiles),
              );
              alert(`成功匯入 ${importedData.length} 個檔案！`);
              loadSavedFiles();
              updateUploadFileList();
            } catch (error) {
              alert("匯入失敗：" + error.message);
            }
          };
          reader.readAsText(file);
          importFileInput.value = ""; // 清空以便下次選擇
        });

        // ===== 批次雲端匯入 =====
        let batchQueue = [];    // [{id, name, ...}, ...]
        let batchIndex = -1;

        const batchNav = document.getElementById("batch-nav");
        const batchInfo = document.getElementById("batch-info");
        const batchPrevBtn = document.getElementById("batch-prev-btn");
        const batchNextBtn = document.getElementById("batch-next-btn");

        function updateBatchNav() {
          if (batchQueue.length <= 1) {
            batchNav.style.display = "none";
            return;
          }
          batchNav.style.display = "flex";
          batchInfo.textContent = `${batchIndex + 1} / ${batchQueue.length}　${batchQueue[batchIndex].name}`;
          batchPrevBtn.disabled = batchIndex <= 0;
          batchNextBtn.disabled = batchIndex >= batchQueue.length - 1;
        }

        async function loadBatchFile(index) {
          const file = batchQueue[index];
          batchIndex = index;
          updateBatchNav();

          try {
            loadingSpinner.style.display = "block";
            loadingSpinner.textContent = `正在下載 (${index + 1}/${batchQueue.length}): ${file.name}...`;

            const downloadUrl =
              "https://script.google.com/macros/s/AKfycbypt3_PnEL5TgdDPaBwg1M5bWAjQMR9dD5Jslicn3eZCtuNSTtqO35RafhQpuX-l9_m/exec?fileId=" +
              file.id;
            const fileResponse = await fetch(downloadUrl);
            const base64Data = await fileResponse.text();

            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
              bytes[i] = binaryString.charCodeAt(i);
            }
            const arrayBuffer = bytes.buffer;

            loadingSpinner.textContent = "正在處理資料...";

            if (typeof ExcelJS === "undefined") {
              const script = document.createElement("script");
              script.src =
                "https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js";
              await new Promise((resolve, reject) => {
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
              });
            }

            const workbook = new ExcelJS.Workbook();
            await workbook.xlsx.load(arrayBuffer);

            let ws =
              workbook.getWorksheet("預覽") ||
              workbook.getWorksheet("Preview");
            if (!ws) {
              throw new Error('找不到名為 "預覽" 或 "Preview" 的工作表。');
            }

            const deck = [];
            const COLS = 21,
              ROWS = 31;
            const GROUP = 7;

            for (let r = 1; r <= ROWS; r++) {
              for (let c = 1; c <= COLS; c++) {
                const sheetColIndex = c + Math.floor((c - 1) / GROUP);
                if ((c - 1) % GROUP === 0) continue;

                const cell = ws.getCell(r, sheetColIndex);
                const value = cell.value ? String(cell.value) : "";
                const fill = cell.fill;

                let backColor = null;
                if (fill && fill.fgColor && fill.fgColor.argb) {
                  const fillColor = fill.fgColor.argb.toUpperCase();
                  if (fillColor === "FFFFFF00") backColor = "R";
                  else if (fillColor === "FF00FFFF") backColor = "B";
                }

                if (!value && !backColor) continue;

                const font = cell.font;
                let suit = "♠";
                let isSignal = false;

                if (font && font.color && font.color.argb) {
                  const fontColor = font.color.argb.toUpperCase();
                  if (
                    fontColor === "FFFF0000" ||
                    fontColor === "FFFF4D4F" ||
                    fontColor === "FFDC3545"
                  ) {
                    isSignal = true;
                  }
                }

                let rank = value;
                if (value === "0") rank = "K";
                if (value === "1") rank = "A";

                deck.push({ rank, suit, back: backColor, isSignal });
              }
            }

            if (deck.length === 0) {
              throw new Error("檔案中沒有找到有效的卡片資料");
            }

            currentFileName = file.name.replace(".xlsx", "");
            currentFileData = arrayBuffer;

            startAssistant(deck);
            messageDiv.textContent = `已從雲端載入: ${currentFileName} (共 ${deck.length} 張卡片)`;
          } catch (error) {
            console.error("從雲端載入錯誤:", error);
            loadingSpinner.style.display = "none";
            alert("從雲端載入失敗: " + error.message);
          }
        }

        if (batchPrevBtn) {
          batchPrevBtn.addEventListener("click", () => {
            if (batchIndex > 0) loadBatchFile(batchIndex - 1);
          });
        }
        if (batchNextBtn) {
          batchNextBtn.addEventListener("click", () => {
            if (batchIndex < batchQueue.length - 1) loadBatchFile(batchIndex + 1);
          });
        }

        // 從雲端載入按鈕事件
        const importDriveBtn = document.getElementById("import-drive-btn");
        if (importDriveBtn) {
          importDriveBtn.addEventListener("click", async () => {
            try {
              loadingSpinner.style.display = "block";
              loadingSpinner.textContent = "正在連接 Google Drive...";

              const response = await fetch(
                "https://script.google.com/macros/s/AKfycbypt3_PnEL5TgdDPaBwg1M5bWAjQMR9dD5Jslicn3eZCtuNSTtqO35RafhQpuX-l9_m/exec",
              );

        async function processFile(file) {

        async function parseExcelToDeck(file) {
          const deck = [];
          const reader = new FileReader();
          await new Promise((resolve, reject) => {
            reader.onload = async (e) => {
              try {
                const buffer = e.target.result;
                const wb = new ExcelJS.Workbook();
                await wb.xlsx.load(buffer);
                let ws = wb.getWorksheet("預覽") || wb.getWorksheet("Preview");
                if (!ws) {
                  throw new Error('找不到名為 "預覽" 或 "Preview" 的工作表。');
                }
                const COLS = 21,
                  ROWS = 31;
                const GROUP = 7;
                for (let r = 1; r <= ROWS; r++) {
                  for (let c = 1; c <= COLS; c++) {
                    const sheetColIndex = c + Math.floor((c - 1) / GROUP);
                    if ((c - 1) % GROUP === 0) continue; // 跳過結果 X/O/和 欄
                    const cell = ws.getCell(r, sheetColIndex);
                    const value = cell.value ? String(cell.value) : "";
                    const fill = cell.fill;
                    let backColor = null;
                    if (fill && fill.fgColor && fill.fgColor.argb) {
                      const fillColor = fill.fgColor.argb.toUpperCase();
                      if (fillColor === "FFFFFF00") backColor = "R";
                      else if (fillColor === "FF00FFFF") backColor = "B";
                    }
                    if (!value && !backColor) continue;
                    const font = cell.font;
                    let suit = "♠";
                    let isSignal = false;
                    if (font && font.color && font.color.argb) {
                      const fontColor = font.color.argb.toUpperCase();
                      // 同時支援標準紅色(FFFF0000)與淺紅色、語音用紅色
                      if (
                        fontColor === "FFFF0000" ||
                        fontColor === "FFFF4D4F" ||
                        fontColor === "FFDC3545"
                      ) {
                        isSignal = true;
                      }
                    }
                    let rank = value;
                    if (value === "0") rank = "K";
                    if (value === "1") rank = "A";
                    deck.push({ rank, suit, back: backColor, isSignal });
                  }
                }
                resolve();
              } catch (err) {
                reject(err);
              }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
          });
          return deck;
        }
        function startAssistant(deck) {

        function updateJumpInputValue() {

        function handleKeyPress(event) {

        function handleSpeedChange() {

        function adjustSpeed(delta) {

          const current = parseFloat(speedSlider.value) || 0;
          const min = parseFloat(speedSlider.min) || 0.05;
          const max = parseFloat(speedSlider.max) || 1.5;
          const next = Math.min(Math.max(current + delta, min), max);
          const normalized = Math.round(next * 100) / 100;
          if (Math.abs(normalized - current) < 0.0001) return;
          speedSlider.value = normalized.toFixed(2);
          handleSpeedChange();

        function toggleAutoplay() {
          if (!isAutoplaying) {

            // 如果需要重新開始，則跳轉到指定的起始位置
            if (needsRestart && autoplayStartInput) {

              const clampedStart = Math.min(

              needsRestart = false; // 標記為已開始，下次暫停再繼續時不會重置

        function advanceCard(direction, isFromAutoplay = false) {
          const newIndex = currentIndex + direction;

        function setJumpControlsEnabled(isEnabled) {
          if (!jumpInput) return;

          jumpApplyBtn.disabled = !isEnabled;
          jumpBackBtn.disabled = !isEnabled;
          jumpForwardBtn.disabled = !isEnabled;

            updateJumpInputValue();
          }
        }
        // 數字轉中文，避免 TTS 引擎把阿拉伯數字唸得太短或唸成英文
        const digitToChinese = {
          "0": "零", "1": "一", "2": "二", "3": "三", "4": "四",
          "5": "五", "6": "六", "7": "七", "8": "八", "9": "九",
        };
        function speakCard(card) {
          // 數字10、J、Q、K都唸成「0」
          let rankText = card.rank;
          if (rankText === "A") {
            rankText = "1";
          } else if (
            rankText === "10" ||
            rankText === "J" ||
            rankText === "Q" ||
            rankText === "K"
          ) {
            rankText = "0";
          }

          const isSignal = Boolean(card.isSignal);
          const comboCode =
            card.back === "R" ? (isSignal ? "3" : "1") : isSignal ? "4" : "2"; // 1:紅、2:黑、3:紅訊號、4:黑訊號

          speakCardNumbers(comboCode, rankText);
        }
        function speakCardNumbers(firstNumber, secondNumber) {
          if (cardSpeechTimeout) {
            clearTimeout(cardSpeechTimeout);
            cardSpeechTimeout = null;
          }
          const sequenceId = ++cardSpeechSequence;
          const synth = window.speechSynthesis;
          synth.pause();
          synth.cancel();
          const firstChinese = digitToChinese[firstNumber] || firstNumber;
          const secondChinese = digitToChinese[secondNumber] || secondNumber;
          const first = createSpeechUtterance(firstChinese);
          const second = createSpeechUtterance(secondChinese);
          second.onend = () => {
            handleCardSpeechComplete(sequenceId);
          };
          second.onerror = () => {
            handleCardSpeechComplete(sequenceId);
          };
          synth.speak(first);
          synth.speak(second);
          synth.resume();
        }
        function initSpeechVoice() {
          const synth = window.speechSynthesis;
          if (!synth) return;
          resolvePreferredSpeechVoice(true);
          const refreshVoice = () => {
            preferredSpeechVoice = null;
            resolvePreferredSpeechVoice(true);
          };
          if (typeof synth.addEventListener === "function") {
            synth.addEventListener("voiceschanged", refreshVoice);
          } else {
            synth.onvoiceschanged = refreshVoice;
          }
        }
        function resolvePreferredSpeechVoice(forceRefresh = false) {
          if (preferredSpeechVoice && !forceRefresh) {
            return preferredSpeechVoice;
          }
          const synth = window.speechSynthesis;
          if (!synth) return null;
          const voices = synth.getVoices();
          if (!voices || voices.length === 0) return null;
          const lower = (text) => String(text || "").toLowerCase();

          for (const hint of speechVoiceNameHints) {
            const byHint = voices.find((voice) =>
              lower(voice.name).includes(lower(hint)),
            );
            if (byHint) {
              preferredSpeechVoice = byHint;
              return preferredSpeechVoice;
            }
          }

          preferredSpeechVoice =
            voices.find((voice) => lower(voice.lang) === "zh-tw") ||
            voices.find((voice) => lower(voice.lang).startsWith("zh-tw")) ||
            voices.find((voice) => lower(voice.lang).startsWith("zh")) ||
            voices[0];
          return preferredSpeechVoice || null;
        }
        function createSpeechUtterance(text) {
          const utterance = new SpeechSynthesisUtterance(String(text));
          utterance.lang = "zh-TW";
          utterance.rate = speechConfig.rate;
          utterance.pitch = speechConfig.pitch;
          utterance.volume = speechConfig.volume;
          const fixedVoice = resolvePreferredSpeechVoice();
          if (fixedVoice) {
            utterance.voice = fixedVoice;
            return utterance;
          }

          // 為 iOS/iPad 選擇更好的語音引擎
          const voices = window.speechSynthesis.getVoices();
          const preferredVoices = [
            "Mei-Jia", // iOS 台灣中文（最佳）
            "Ting-Ting", // iOS 簡體中文（備用）
            "Sin-ji", // iOS 粵語（備用）
          ];

          for (const name of preferredVoices) {
            const voice = voices.find((v) => v.name.includes(name));
            if (voice) {
              utterance.voice = voice;
              break;
            }
          }

          return utterance;
        }
        function speak(text) {
          cardSpeechSequence++;
          if (cardSpeechTimeout) {
            clearTimeout(cardSpeechTimeout);
            cardSpeechTimeout = null;
          }
          window.speechSynthesis.cancel();
          const utterance = createSpeechUtterance(text);
          window.speechSynthesis.speak(utterance);
        }
        function handleCardSpeechComplete(sequenceId) {
          if (sequenceId !== cardSpeechSequence) return;
          if (cardSpeechTimeout) {
            clearTimeout(cardSpeechTimeout);

          }
          if (waitingForAutoplay && isAutoplaying) {

        function scheduleNextAutoplay() {
          if (!isAutoplaying) return;

          // 檢查播放方向
          const direction =

            "forward";
          const step = direction === "forward" ? 1 : -1;

          // 檢查是否已經到達邊界
          if (

            (step === -1 && currentIndex < 0)

          clearTimeout(autoplayTimer);

        }

        function startTimer() {

        function updateTimerDisplay() {
